releaseTarget:
  upstreamRemote: upstream
  upstreamRepo: liliMozi/openhanako
  upstreamBranch: main
  forkBranch: dev
  stableOnlyDefault: true
  prereleaseFlag: --include-prerelease
  syncLog: FORK_SYNC.md

dashboard:
  prNumber: 1
  title: "DRAFT: permanent fork-vs-upstream review dashboard"
  labels:
    - permanent-dashboard
    - never-merge
    - fork-sync

issueTracking:
  tracker: scripts/track-upstream-issues.mjs
  commands:
    - status
    - search
    - draft
  states:
    - existing/open
    - draft/pending-approval
    - tracked/no-upstream-issue
  submission: never

criticalFileClasses:
  - lan_connect_auth
  - remote_attachment_preview
  - websocket_session_identity
  - desktop_packaging
  - fork_sync_maintenance

conflictRules:
  defaultResolution: main
  dryRunDefault: true
  divergingFiles:
    - core/server-auth.ts
    - desktop/src/react/services/server-connection.ts
    - desktop/main.cjs
    - desktop/preload.cjs
    - tests/server-auth.test.ts
    - tests/server-connection.test.ts
    - desktop/src/react/__tests__/services/server-connection.test.ts
    - desktop/src/modules/connection-csp.js
    - desktop/src/react/services/resource-url.ts
    - desktop/src/react/utils/user-attachment-media.ts
    - desktop/src/react/MainContent.tsx
    - desktop/src/react/components/InputArea.tsx
    - desktop/src/react/stores/chat-slice.ts
    - desktop/src/react/stores/selectors/file-refs.ts
    - desktop/src/react/utils/uploaded-session-file.ts
    - desktop/src/react/utils/preview-file-refresh.ts
    - desktop/src/react/utils/preview-document-refresh.ts
    - desktop/src/react/utils/remote-file-preview.ts
    - server/routes/upload.ts
    - tests/csp-sync.test.ts
    - tests/upload-route.test.ts
    - desktop/src/react/__tests__/components/MainContent.drag.test.tsx
    - desktop/src/react/__tests__/components/InputArea.paste-and-slash.test.tsx
    - desktop/src/react/__tests__/components/InputArea.media-send.test.tsx
    - desktop/src/react/__tests__/services/resource-url.test.ts
    - desktop/src/react/__tests__/services/ws-message-handler.test.ts
    - desktop/src/react/services/ws-message-handler.ts
    - desktop/src/react/__tests__/stores/chat-slice.test.ts
    - desktop/src/react/__tests__/stores/selectors/file-refs.test.ts
    - desktop/src/react/__tests__/utils/user-attachment-media.test.ts
    - tests/plugin-sdk-examples.test.ts
    - tests/office-workflow-plugin.test.ts
    - package.json
    - package-lock.json
  policies:
    core/server-auth.ts:
      class: lan_connect_auth
      risk: high
      resolution: HUMAN REVIEW ALWAYS. Never auto-resolve.
    desktop/src/react/services/server-connection.ts:
      class: lan_connect_auth
      risk: high
      resolution: HUMAN REVIEW. Preserve connect probe and query-token behavior.
    tests/server-connection.test.ts:
      class: lan_connect_auth
      risk: medium
      strategy: preserve-both
      resolution: Preserve fork LAN device-credential query-token WebSocket coverage while keeping upstream websocket-ticket coverage for non-LAN remote connections.
      plannedAction: LAN device connections should expect token query fallback; custom_remote/tunnel device connections should still expect wsTicket behavior.
    desktop/src/modules/connection-csp.js:
      class: remote_attachment_preview
      risk: high
      resolution: HUMAN REVIEW. Keep scoped remote resource origins in img-src and media-src.
    desktop/src/react/services/resource-url.ts:
      class: remote_attachment_preview
      risk: high
      resolution: HUMAN REVIEW. Preserve remote session resource URL synthesis.
    desktop/src/react/utils/preview-file-refresh.ts:
      class: remote_attachment_preview
      risk: medium
      strategy: preserve-both
      resolution: HUMAN REVIEW. Preserve the single version-aware retry helper path for local preview refresh; duplicate helper declarations are a failed merge.
      plannedAction: Keep one retry helper block with file-version comparison, remove duplicate declarations, then run MainContent drag and preview refresh tests.
    desktop/src/react/utils/preview-document-refresh.ts:
      class: remote_attachment_preview
      risk: medium
      strategy: preserve-both
      resolution: HUMAN REVIEW. Preserve multi-mount native-root lookup while accepting upstream preview-refresh behavior.
      plannedAction: Keep nativeRootForWorkbenchMount-based refresh behavior and verify document/workbench preview tests.
    desktop/src/react/utils/remote-file-preview.ts:
      class: remote_attachment_preview
      risk: medium
      strategy: preserve-both
      resolution: HUMAN REVIEW. Preserve version-aware remote preview snapshots and scoped workbench resource refs.
      plannedAction: Keep newestKnownFileVersion and remoteContentRefWithVersion behavior, then verify websocket and workbench preview tests.
    desktop/src/react/__tests__/services/ws-message-handler.test.ts:
      class: remote_attachment_preview
      risk: medium
      strategy: preserve-both
      resolution: Start from main, then preserve fork regression coverage for replayed optimistic attachments receiving server fileId metadata.
      plannedAction: Would keep upstream session identity and preview refresh tests, then preserve the fork replayed optimistic attachment hydration regression test.
      linkedRisks:
        - file: desktop/src/react/services/ws-message-handler.ts
          strategy: human-review
          risk: high
          resolution: Upstream ws-message-handler tests can imply production session identity behavior that the fork must preserve.
          plannedAction: Report the production service file as a secondary risk; inspect the test and service behavior together before treating the dashboard conflict as resolved.
    desktop/src/react/services/ws-message-handler.ts:
      class: websocket_session_identity
      risk: high
      resolution: HUMAN REVIEW. Preserve fork session identity routing and optimistic attachment hydration while accepting upstream preview refresh behavior.
      plannedAction: Inspect production ws-message-handler behavior with the paired test expectations; do not let a test-only conflict reduction hide session identity regressions.
    package.json:
      class: desktop_packaging
      risk: medium
      strategy: defer-to-stable-production-sync
      resolution: Defer package version alignment to the attended stable production fork sync. Preserve the fork package baseline and install:local behavior during dashboard-only conflict reduction.
      plannedAction: Report only. Do not pre-bump the package version for the dashboard; production stable fork sync owns the upstream version update and install:local preservation together.
    package-lock.json:
      class: desktop_packaging
      risk: medium
      strategy: defer-to-stable-production-sync
      resolution: Defer lockfile root metadata changes until the attended stable production fork sync resolves package.json.
      plannedAction: Report only. Do not regenerate or pre-bump package-lock.json for the dashboard; stable production fork sync regenerates it after the package version decision.
    tests/plugin-sdk-examples.test.ts:
      class: fork_sync_maintenance
      risk: medium
      strategy: preserve-both
      resolution: Preserve upstream SDK tarball coverage and fork office-workflow example coverage.
      plannedAction: Keep both bundled SDK tarball assertions and office-workflow intentional-template assertions, then run plugin example tests.
    tests/office-workflow-plugin.test.ts:
      class: fork_sync_maintenance
      risk: low
      resolution: Preserve fork office-workflow example plugin behavior and lint coverage.

verification:
  tier1Tests:
    - tests/server-auth.test.ts
    - tests/server-connection.test.ts
    - tests/csp-sync.test.ts
    - desktop/src/react/__tests__/services/server-connection.test.ts
    - desktop/src/react/__tests__/components/MainContent.drag.test.tsx
    - desktop/src/react/__tests__/components/InputArea.paste-and-slash.test.tsx
    - desktop/src/react/__tests__/components/InputArea.media-send.test.tsx
    - desktop/src/react/__tests__/services/ws-message-handler.test.ts
    - desktop/src/react/__tests__/services/resource-url.test.ts
    - desktop/src/react/__tests__/stores/chat-slice.test.ts
    - desktop/src/react/__tests__/stores/selectors/file-refs.test.ts
    - desktop/src/react/__tests__/components/shared/MediaViewer/media-source.test.ts
    - desktop/src/react/__tests__/utils/open-media-viewer.test.ts
    - desktop/src/react/__tests__/utils/user-attachment-media.test.ts
    - desktop/src/react/__tests__/components/RightWorkspacePanel.test.tsx
    - tests/upload-route.test.ts
    - tests/plugin-sdk-examples.test.ts
    - tests/office-workflow-plugin.test.ts
  commands:
    - npm run build:main
    - npm run build:preload
  bundleGreps:
    - file: desktop/main.bundle.cjs
      pattern: connect:probe
      label: connect:probe present in desktop/main.bundle.cjs
    - file: desktop/preload.bundle.cjs
      pattern: probeConnection
      label: probeConnection present in desktop/preload.bundle.cjs
    - file: desktop/src/modules/connection-csp.js
      patterns:
        - media-src
        - httpSourcesOnly
      label: runtime connection CSP keeps scoped remote resource-origin logic
  liveSmoke:
    - Clear localStorage in HanaAgent desktop, then reload.
    - Connect LAN Server to http://100.125.173.118:14500 with the device key.
    - Confirm no CSP connect errors, no WS_DISCONNECTED, and WebSocket establishes.
    - Paste/upload an image, send it, switch chats, return, and confirm chat thumbnail plus Conversation Files preview still render.
